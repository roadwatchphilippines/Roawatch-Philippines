<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoadWatch PH Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020b17;
      --panel: rgba(8, 30, 54, 0.9);
      --text: #f5f9ff;
      --muted: #bfd7f6;
      --accent: #2a9dff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(36, 120, 196, 0.25), transparent 38%),
        linear-gradient(145deg, #030a14 0%, #071b31 45%, #051529 100%);
      padding: 16px;
    }

    .loginCard {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid rgba(169, 208, 255, 0.28);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    h2 { margin: 0 0 16px; }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      margin: 0 0 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(160, 220, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 0.95rem;
    }

    button {
      width: 100%;
      margin: 8px 0 0;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: rgba(66, 124, 194, 0.35);
    }

    .divider {
      margin: 12px 0;
      border: 0;
      border-top: 1px solid rgba(160, 220, 255, 0.25);
    }

    .homeLink {
      margin-top: 14px;
      text-align: center;
    }

    .homeLink a {
      color: #9bd7ff;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="loginCard">
    <h2>RoadWatch PH Login</h2>
    <p>Sign in to continue to the enhanced RoadWatch PH homepage.</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="secondary" onclick="register()">Register</button>

    <hr class="divider">

    <button class="secondary" onclick="googleLogin()">Login with Google</button>

    <div class="homeLink">
      <a href="index.html">Continue without login</a>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
